<head>

<title>良益堂文案生成器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #F9F6F1; min-height: 100vh; min-height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
button, input, textarea { -webkit-appearance: none; appearance: none; }
button { touch-action: manipulation; }
.wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 20px 0 16px; }
.header .emoji { font-size: 36px; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 600; color: #3D2010; letter-spacing: 2px; }
.header p { font-size: 13px; color: #A07850; margin-top: 5px; }
.tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 7px 15px; border-radius: 20px; border: 1px solid #E0C9A8; background: #fff; color: #A07850; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.tab.active { background: #FDF0E8; border-color: #C8956B; color: #C8956B; font-weight: 600; }
.list { display: flex; flex-direction: column; gap: 10px; }
.card { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
.card:active { background: #FDFAF6; }
.card-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 500; color: #2C1A08; margin-bottom: 3px; }
.card-cat { font-size: 11px; }
.card-arrow { font-size: 20px; color: #C0A080; flex-shrink: 0; }
.back { background: none; border: none; color: #A07850; font-size: 14px; cursor: pointer; padding: 0 0 16px; display: flex; align-items: center; gap: 4px; }
.form-card { background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.form-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #F0E6D8; }
.form-header .big-emoji { font-size: 28px; }
.form-header .title { font-size: 16px; font-weight: 500; color: #2C1A08; }
.form-header .subtitle { font-size: 11px; margin-top: 2px; }
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 13px; color: #7A5C3A; display: block; margin-bottom: 7px; font-weight: 500; }
.field input, .field textarea { width: 100%; padding: 11px 13px; border: 1px solid #DDD0BB; border-radius: 10px; font-size: 14px; color: #2C1A08; background: #FDFAF6; outline: none; font-family: inherit; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color: #C8956B; }
.field input::placeholder, .field textarea::placeholder { color: #C0A888; }
.field textarea { resize: none; line-height: 1.6; }
.btn-main { width: 100%; padding: 15px; background: #C8956B; color: #fff; border: none; border-radius: 13px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: background 0.15s; }
.btn-main:active { background: #B07850; }
.btn-main.green { background: #4A8C30; }
.btn-secondary { width: 100%; padding: 12px; background: none; color: #A07850; border: 1px solid #DDD0BB; border-radius: 13px; font-size: 14px; cursor: pointer; margin-top: 10px; }
.btn-secondary:active { background: #F5EFE5; }
.result-box { background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 18px; margin-bottom: 14px; font-size: 14px; line-height: 1.9; color: #2C1A08; white-space: pre-wrap; word-break: break-all; }
.result-tip { text-align: center; font-size: 12px; color: #A07850; margin-bottom: 14px; }
.media-box { background:#FFF9F2; border:1px solid #E8D5BD; border-radius:14px; padding:16px; margin:0 0 14px; }
.media-title { font-size:15px; font-weight:600; color:#3D2010; margin-bottom:10px; }
.media-row { margin-top:10px; }
.media-label { font-size:12px; font-weight:600; color:#C8956B; margin-bottom:4px; }
.media-text { font-size:13px; line-height:1.7; color:#5A402A; white-space:pre-wrap; }
.media-note { margin-top:10px; padding-top:10px; border-top:1px dashed #DFC9AE; font-size:12px; line-height:1.6; color:#94704F; }
.footer { text-align: center; margin-top: 28px; font-size: 11px; color: #C0A888; padding-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="emoji">👐</div>
    <h1>良益堂文案生成器</h1>
    <p>选模板 → 填信息 → 一键复制发圈</p>
  </div>
  <div id="page-list">
    <div class="tabs" id="tabs"></div>
    <div class="list" id="template-list"></div>
  </div>
  <div id="page-form" style="display:none">
    <button class="back" onclick="goList()">‹ 返回选模板</button>
    <div class="form-card" id="form-content"></div>
    <button class="btn-main" onclick="generate()">生成文案 ✨</button>
  </div>
  <div id="page-result" style="display:none">
    <button class="back" onclick="goList()">‹ 返回选模板</button>
    <p class="result-tip">👇 文案已生成，点击复制后去微信粘贴</p>
    <div class="result-box" id="result-text"></div>
    <div class="media-box" id="media-box">
      <div class="media-title">📷 这条文案配什么图 / 视频</div>
      <div class="media-row"><div class="media-label">首选图片</div><div class="media-text" id="media-photo"></div></div>
      <div class="media-row"><div class="media-label">首选视频</div><div class="media-text" id="media-video"></div></div>
      <div class="media-note" id="media-note"></div>
    </div>
    <button class="btn-main" id="copy-btn" onclick="copyText()">📋 一键复制文案</button>
    <button class="btn-secondary" onclick="reEdit()">重新修改</button>
  </div>
  <div class="footer">良益堂少儿推拿 · 哈密</div>
</div>

const categories = ["全部","案例记录","好评反馈","科普知识","日常 / 人设","活动促销"];
let currentCat = "全部";
let currentTemplate = null;
let currentFields = {};

function init() {
  const tabsEl = document.getElementById("tabs");
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "tab" + (cat === currentCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => filterCat(cat);
    tabsEl.appendChild(btn);
  });
  renderList();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll(".tab").forEach((el,i) => {
    el.className = "tab" + (categories[i] === cat ? " active" : "");
  });
  renderList();
}

function renderList() {
  const listEl = document.getElementById("template-list");
  listEl.innerHTML = "";
  const filtered = currentCat === "全部" ? templates : templates.filter(t => t.category === currentCat);
  filtered.forEach(t => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-icon" style="background:${t.bg}">${t.icon}</div>
      <div class="card-info">
        <div class="card-name">${t.name}</div>
        <div class="card-cat" style="color:${t.color}">${t.category}</div>
      </div>
      <div class="card-arrow">›</div>
    `;
    card.onclick = () => selectTemplate(t);
    listEl.appendChild(card);
  });
}

function selectTemplate(t) {
  currentTemplate = t;
  currentFields = {};
  if (t.fields.length === 0) {
    showResult(t.gen({}));
    return;
  }
  const formEl = document.getElementById("form-content");
  formEl.innerHTML = `
    <div class="form-header">
      <div class="big-emoji">${t.icon}</div>
      <div>
        <div class="title">${t.name}</div>
        <div class="subtitle" style="color:${t.color}">${t.category}</div>
      </div>
    </div>
    ${t.fields.map(f => `
      <div class="field">
        <label>${f.label}</label>
        ${f.type === 'textarea'
          ? `<textarea rows="3" placeholder="${f.placeholder}" oninput="setField('${f.key}',this.value)"></textarea>`
          : `<input type="text" placeholder="${f.placeholder}" oninput="setField('${f.key}',this.value)">`
        }
      </div>
    `).join("")}
  `;
  showPage("form");
}

function setField(key, val) {
  currentFields[key] = val;
}

function generate() {
  const result = currentTemplate.gen(currentFields);
  showResult(result);
}

function showResult(text) {
  document.getElementById("result-text").textContent = text;
  const media = currentTemplate ? mediaMap[currentTemplate.id] : null;
  document.getElementById("media-box").style.display = media ? "" : "none";
  if (media) {
    document.getElementById("media-photo").textContent = media.photo;
    document.getElementById("media-video").textContent = media.video;
    document.getElementById("media-note").textContent = "拍摄注意：" + media.note;
  }
  document.getElementById("copy-btn").textContent = "📋 一键复制文案";
  document.getElementById("copy-btn").style.background = "#C8956B";
  showPage("result");
}

async function copyText() {
  const text = document.getElementById("result-text").textContent;
  const btn = document.getElementById("copy-btn");

  function success() {
    btn.textContent = "✅ 复制成功！去微信粘贴发朋友圈";
    btn.style.background = "#4A8C30";
  }

  function fallbackCopy() {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "0";
    ta.style.fontSize = "16px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    let ok = false;
    try { ok = document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    if (ok) {
      success();
    } else {
      window.prompt("请长按下方文字，选择“全选”后复制：", text);
    }
  }

  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      success();
    } else {
      fallbackCopy();
    }
  } catch (e) {
    fallbackCopy();
  }
}

function reEdit() {
  if (!currentTemplate) return goList();
  if (currentTemplate.fields.length === 0) return goList();
  showPage("form");
}

function goList() {
  showPage("list");
}

function showPage(name) {
  document.getElementById("page-list").style.display = name === "list" ? "" : "none";
  document.getElementById("page-form").style.display = name === "form" ? "" : "none";
  document.getElementById("page-result").style.display = name === "result" ? "" : "none";
  window.scrollTo(0, 0);
}

init();
</script>

  const standalone = window.navigator.standalone === true;
  if (isIOS && !standalone && location.protocol.indexOf("http") === 0) {
    const footer = document.querySelector(".footer");
    if (footer) {
      const tip = document.createElement("div");
      tip.style.cssText = "margin-top:10px;color:#A07850;font-size:11px;line-height:1.6";
      tip.textContent = "可在 Safari 中点“分享”→“添加到主屏幕”，以后像 App 一样打开";
      footer.appendChild(tip);
    }
  }
})();
</script>
