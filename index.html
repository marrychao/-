<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="良益堂文案">
<meta name="format-detection" content="telephone=no">
<title>良益堂文案生成器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #F9F6F1; min-height: 100vh; min-height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: none; }
button, input, textarea { -webkit-appearance: none; appearance: none; }
button { touch-action: manipulation; }
.wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 20px 0 16px; }
.header .emoji { font-size: 36px; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 600; color: #3D2010; letter-spacing: 2px; }
.header p { font-size: 13px; color: #A07850; margin-top: 5px; }
.tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 7px 15px; border-radius: 20px; border: 1px solid #E0C9A8; background: #fff; color: #A07850; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.tab.active { background: #FDF0E8; border-color: #C8956B; color: #C8956B; font-weight: 600; }
.list { display: flex; flex-direction: column; gap: 10px; }
.card { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
.card:active { background: #FDFAF6; }
.card-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 500; color: #2C1A08; margin-bottom: 3px; }
.card-cat { font-size: 11px; }
.card-arrow { font-size: 20px; color: #C0A080; flex-shrink: 0; }
.back { background: none; border: none; color: #A07850; font-size: 14px; cursor: pointer; padding: 0 0 16px; display: flex; align-items: center; gap: 4px; }
.form-card { background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.form-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #F0E6D8; }
.form-header .big-emoji { font-size: 28px; }
.form-header .title { font-size: 16px; font-weight: 500; color: #2C1A08; }
.form-header .subtitle { font-size: 11px; margin-top: 2px; }
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 13px; color: #7A5C3A; display: block; margin-bottom: 7px; font-weight: 500; }
.field input, .field textarea { width: 100%; padding: 11px 13px; border: 1px solid #DDD0BB; border-radius: 10px; font-size: 14px; color: #2C1A08; background: #FDFAF6; outline: none; font-family: inherit; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color: #C8956B; }
.field input::placeholder, .field textarea::placeholder { color: #C0A888; }
.field textarea { resize: none; line-height: 1.6; }
.btn-main { width: 100%; padding: 15px; background: #C8956B; color: #fff; border: none; border-radius: 13px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: background 0.15s; }
.btn-main:active { background: #B07850; }
.btn-main.green { background: #4A8C30; }
.btn-secondary { width: 100%; padding: 12px; background: none; color: #A07850; border: 1px solid #DDD0BB; border-radius: 13px; font-size: 14px; cursor: pointer; margin-top: 10px; }
.btn-secondary:active { background: #F5EFE5; }
.result-box { background: #fff; border: 1px solid #EDE3D5; border-radius: 14px; padding: 18px; margin-bottom: 14px; font-size: 14px; line-height: 1.9; color: #2C1A08; white-space: pre-wrap; word-break: break-all; }
.result-tip { text-align: center; font-size: 12px; color: #A07850; margin-bottom: 14px; }
.footer { text-align: center; margin-top: 28px; font-size: 11px; color: #C0A888; padding-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="emoji">👐</div>
    <h1>良益堂文案生成器</h1>
    <p>选模板 → 填信息 → 一键复制发圈</p>
  </div>
  <div id="page-list">
    <div class="tabs" id="tabs"></div>
    <div class="list" id="template-list"></div>
  </div>
  <div id="page-form" style="display:none">
    <button class="back" onclick="goList()">‹ 返回选模板</button>
    <div class="form-card" id="form-content"></div>
    <button class="btn-main" onclick="generate()">生成文案 ✨</button>
  </div>
  <div id="page-result" style="display:none">
    <button class="back" onclick="goList()">‹ 返回选模板</button>
    <p class="result-tip">👇 文案已生成，点击复制后去微信粘贴</p>
    <div class="result-box" id="result-text"></div>
    <button class="btn-main" id="copy-btn" onclick="copyText()">📋 一键复制文案</button>
    <button class="btn-secondary" onclick="reEdit()">重新修改</button>
  </div>
  <div class="footer">良益堂少儿推拿 · 哈密</div>
</div>
<script>
const PHONE = "L13579655596";
const templates = [
{id:1,category:"案例记录",color:"#C8956B",bg:"#FDF0E8",name:"积食 / 消化不好",icon:"🍽️",fields:[{key:"age",label:"宝宝几岁",placeholder:"例：3"},{key:"days",label:"几天没好好吃饭",placeholder:"例：3"},{key:"symptom",label:"还有什么症状（可不填）",placeholder:"例：肚子鼓鼓的、口气重"}],gen:(f)=>`今天上门｜${f.age}岁宝宝，${f.days}天没好好吃饭${f.symptom?`，${f.symptom}`:""}，睡觉也不安稳。\n\n重点调理：脾胃 + 消积\n推拿结束宝宝很快入睡 🌙\n\n积食不处理，反复感冒、睡眠差都会跟着来。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:2,category:"案例记录",color:"#C8956B",bg:"#FDF0E8",name:"感冒 / 免疫力差",icon:"🤧",fields:[{key:"age",label:"宝宝几岁",placeholder:"例：2"},{key:"months",label:"反复感冒多久了",placeholder:"例：一个多月"},{key:"result",label:"推拿后效果",placeholder:"例：出了点汗，状态轻松了"}],gen:(f)=>`今天上门｜${f.age}岁宝宝，反复感冒${f.months}，刚好没几天又开始流鼻涕。\n\n重点调理：肺经 + 补正气\n推拿后${f.result||"状态明显改善"}。\n\n孩子老生病，根本在于正气不足。把体质调好，比每次生病吃药更重要。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:3,category:"案例记录",color:"#C8956B",bg:"#FDF0E8",name:"睡眠差 / 夜啼",icon:"😴",fields:[{key:"age",label:"宝宝几岁",placeholder:"例：1"},{key:"symptom",label:"睡眠问题描述",placeholder:"例：夜里频繁醒，哭闹"}],gen:(f)=>`今天上门｜${f.age}岁宝宝，入睡困难，${f.symptom||"夜里频繁醒"}，妈妈也跟着没睡好。\n\n重点调理：安神 + 心脾\n推拿结束宝宝当场睡着了 😴\n\n孩子睡不好，多半是脾胃积热或心神不宁，推拿比吃药温和，适合长期坚持。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:4,category:"案例记录",color:"#C8956B",bg:"#FDF0E8",name:"发烧 / 低热",icon:"🌡️",fields:[{key:"age",label:"宝宝几岁",placeholder:"例：4"},{key:"temp",label:"体温（度）",placeholder:"例：38.2"},{key:"result",label:"推拿后效果",placeholder:"例：体温回落，宝宝安静了"}],gen:(f)=>`今天上门｜${f.age}岁宝宝，低烧${f.temp}度，精神还好，家长不想直接上退烧药。\n\n重点调理：清热 + 退烧穴位\n推拿完${f.result||"体温明显回落"}。\n\n38.5度以下的低烧，推拿配合物理降温是很好的选择。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:5,category:"好评反馈",color:"#378ADD",bg:"#EBF4FF",name:"家长说好话了",icon:"💬",fields:[{key:"feedback",label:"家长说的话（原话最真实）",placeholder:"例：孩子这周胃口好多了，主动要添饭！",type:"textarea"}],gen:(f)=>`收到宝妈的反馈，很开心 🙏\n\n"${f.feedback}"\n\n做这行最有成就感的时刻就是这种——孩子好了，家长安心了，值得。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:6,category:"好评反馈",color:"#378ADD",bg:"#EBF4FF",name:"锦旗 / 特别致谢",icon:"🏅",fields:[{key:"name",label:"家长姓名",placeholder:"例：吴玥静"},{key:"words",label:"锦旗上的话",placeholder:"例：妙手巧推拿，医德暖人心"}],gen:(f)=>`家长送来的锦旗，字字让我感动。\n\n"${f.words}"\n\n这几个字是对我最大的鼓励，也是我继续认真做下去的动力。\n感谢${f.name}家长的信任与认可 🙏\n\n哈密上门小儿推拿，有需要的宝妈私信我。\n微信：${PHONE}`},
{id:7,category:"好评反馈",color:"#378ADD",bg:"#EBF4FF",name:"老客户复购了",icon:"🔁",fields:[{key:"times",label:"第几次推拿了",placeholder:"例：8"},{key:"before",label:"最初是什么问题",placeholder:"例：积食、睡不好"},{key:"after",label:"现在改善情况",placeholder:"例：吃饭香了，睡觉安稳"}],gen:(f)=>`这是第${f.times}次给这个小朋友推拿了。\n\n从最初的${f.before||"各种不舒服"}，到现在${f.after||"明显改善"}，宝妈说孩子比以前好带多了。\n\n坚持调理真的有效果。孩子体质不是一两次能改变的，贵在坚持。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:8,category:"科普知识",color:"#3B6D11",bg:"#EBF5E0",name:"如何判断积食",icon:"📋",fields:[],gen:()=>`分享一个判断孩子积食的小方法 👇\n\n✅ 口气重、有酸味\n✅ 舌苔厚白或发黄\n✅ 大便臭、不规律\n✅ 睡觉翻来覆去\n✅ 食欲突然变差\n\n有2条以上，基本可以判断积食了。\n积食不处理，容易反复感冒、睡眠差。\n\n有问题欢迎私信——\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:9,category:"科普知识",color:"#3B6D11",bg:"#EBF5E0",name:"看舌苔识健康",icon:"👅",fields:[],gen:()=>`宝宝的舌苔，会说话 👇\n\n🟡 薄白苔 → 正常，脾胃健康\n🟡 白厚苔 → 积食、消化不好\n🟡 黄厚苔 → 积食化热，有内火\n🟡 地图舌 → 脾胃虚弱，需要调理\n🟡 无苔/镜面舌 → 气阴两虚，注意\n\n每天早上给孩子看看舌苔，是最简单的健康自查方式。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:10,category:"科普知识",color:"#3B6D11",bg:"#EBF5E0",name:"推拿 vs 吃药",icon:"💊",fields:[],gen:()=>`很多宝妈问我：推拿和吃药，哪个好？\n\n我的看法——\n急症：该看医生就看医生，不耽误。\n调理：推拿更温和，没有副作用，适合长期坚持。\n预防：推拿做得好，孩子少生病，少受罪，家长也少折腾。\n\n推拿不是万能的，但对脾胃调理、体质提升，有医院替代不了的作用。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:11,category:"科普知识",color:"#3B6D11",bg:"#EBF5E0",name:"季节养护提醒",icon:"🌿",fields:[{key:"season",label:"哪个季节",placeholder:"例：春季 / 冬季 / 换季时"},{key:"tip",label:"这季节要注意什么",placeholder:"例：气候变化大，孩子容易感冒"}],gen:(f)=>`${f.season||"换季"}来了，孩子最需要注意这些 👇\n\n🌱 ${f.tip||"气候变化大，正气弱的孩子最先中招"}\n🌱 饮食注意温热，少吃生冷\n🌱 提前推拿调理，比生病后治更划算\n\n有需要私信我，哈密本地上门服务。\n哈密上门小儿推拿｜微信：${PHONE}`},
{id:12,category:"日常 / 人设",color:"#BA7517",bg:"#FFF5E0",name:"工作日记",icon:"📝",fields:[{key:"count",label:"今天跑了几户",placeholder:"例：4"},{key:"feeling",label:"今天的感受（可不填）",placeholder:"例：手有点酸，但很满足"}],gen:(f)=>`今天跑了${f.count}户，${f.feeling||"手有点酸，但看到宝宝推完安静睡着，觉得值了"}。\n\n做这行，最大的成就感不是挣了多少钱——是孩子好了，家长放心了。\n\n哈密上门小儿推拿，明天继续 💪`},
{id:13,category:"日常 / 人设",color:"#BA7517",bg:"#FFF5E0",name:"暖心故事",icon:"❤️",fields:[{key:"story",label:"家长说的话 / 发生的事",placeholder:"例：孩子这个月没去医院，破纪录了",type:"textarea"}],gen:(f)=>`有个宝妈今天跟我说："${f.story||"孩子这个月没去医院，破纪录了。"}"\n\n她说得轻描淡写，我心里却特别高兴。\n\n孩子健康，才是一家人最大的安心。\n哈密上门小儿推拿｜良益堂`},
{id:14,category:"活动促销",color:"#534AB7",bg:"#F0EEFF",name:"老带新优惠",icon:"🎁",fields:[{key:"discount",label:"新客享受什么优惠",placeholder:"例：首次半价"},{key:"reward",label:"老客得到什么奖励",placeholder:"例：下次推拿减30元"}],gen:(f)=>`老客户福利 🎁\n\n感谢一直信任我的家长们，现推出推荐活动：\n\n您介绍新朋友来 → 对方${f.discount||"首次享优惠"}\n您的奖励 → ${f.reward||"下次推拿有折扣"}\n\n哈密圈子小，口碑比广告管用。\n活动名额有限，有意向的宝妈私信我登记。\n微信：${PHONE}`},
{id:15,category:"活动促销",color:"#534AB7",bg:"#F0EEFF",name:"节日关怀",icon:"🎉",fields:[{key:"holiday",label:"什么节日",placeholder:"例：春节 / 中秋 / 国庆"}],gen:(f)=>`${f.holiday||"节日"}快乐 🎉\n\n节假日孩子聚餐多、作息乱，最容易积食和感冒。\n\n节后如果孩子出现：口气重、不想吃饭、睡不好……\n就是积食的信号，及时调理比等生病了再治强。\n\n节后正常上门服务，欢迎预约。\n哈密上门小儿推拿｜微信：${PHONE}`}
];
const categories=["全部","案例记录","好评反馈","科普知识","日常 / 人设","活动促销"];
let currentCat="全部",currentTemplate=null,currentFields={};
function init(){const tabsEl=document.getElementById("tabs");categories.forEach(cat=>{const btn=document.createElement("button");btn.className="tab"+(cat===currentCat?" active":"");btn.textContent=cat;btn.onclick=()=>filterCat(cat);tabsEl.appendChild(btn)});renderList()}
function filterCat(cat){currentCat=cat;document.querySelectorAll(".tab").forEach((el,i)=>{el.className="tab"+(categories[i]===cat?" active":"")});renderList()}
function renderList(){const listEl=document.getElementById("template-list");listEl.innerHTML="";const filtered=currentCat==="全部"?templates:templates.filter(t=>t.category===currentCat);filtered.forEach(t=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<div class="card-icon" style="background:${t.bg}">${t.icon}</div><div class="card-info"><div class="card-name">${t.name}</div><div class="card-cat" style="color:${t.color}">${t.category}</div></div><div class="card-arrow">›</div>`;card.onclick=()=>selectTemplate(t);listEl.appendChild(card)})}
function selectTemplate(t){currentTemplate=t;currentFields={};if(t.fields.length===0){showResult(t.gen({}));return}const formEl=document.getElementById("form-content");formEl.innerHTML=`<div class="form-header"><div class="big-emoji">${t.icon}</div><div><div class="title">${t.name}</div><div class="subtitle" style="color:${t.color}">${t.category}</div></div></div>${t.fields.map(f=>`<div class="field"><label>${f.label}</label>${f.type==='textarea'?`<textarea rows="3" placeholder="${f.placeholder}" oninput="setField('${f.key}',this.value)"></textarea>`:`<input type="text" placeholder="${f.placeholder}" oninput="setField('${f.key}',this.value)">`}</div>`).join("")}`;showPage("form")}
function setField(key,val){currentFields[key]=val}
function generate(){showResult(currentTemplate.gen(currentFields))}
function showResult(text){document.getElementById("result-text").textContent=text;const b=document.getElementById("copy-btn");b.textContent="📋 一键复制文案";b.style.background="#C8956B";showPage("result")}
async function copyText(){const text=document.getElementById("result-text").textContent;const btn=document.getElementById("copy-btn");const success=()=>{btn.textContent="✅ 复制成功！去微信粘贴发朋友圈";btn.style.background="#4A8C30"};const fallback=()=>{const ta=document.createElement("textarea");ta.value=text;ta.setAttribute("readonly","");ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);let ok=false;try{ok=document.execCommand("copy")}catch(e){}document.body.removeChild(ta);if(ok)success();else window.prompt("请长按下方文字，选择“全选”后复制：",text)};try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);success()}else fallback()}catch(e){fallback()}}
function reEdit(){if(!currentTemplate||currentTemplate.fields.length===0)return goList();showPage("form")}
function goList(){showPage("list")}
function showPage(name){document.getElementById("page-list").style.display=name==="list"?"":"none";document.getElementById("page-form").style.display=name==="form"?"":"none";document.getElementById("page-result").style.display=name==="result"?"":"none";window.scrollTo(0,0)}
init();
(function(){const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);const standalone=window.navigator.standalone===true;if(isIOS&&!standalone&&location.protocol.indexOf("http")===0){const footer=document.querySelector(".footer");if(footer){const tip=document.createElement("div");tip.style.cssText="margin-top:10px;color:#A07850;font-size:11px;line-height:1.6";tip.textContent="可在 Safari 中点“分享”→“添加到主屏幕”，以后像 App 一样打开";footer.appendChild(tip)}}})();
</script>
</body>
</html>
